name: PetPath Bot Tester

on:
  schedule:
    - cron: '0 9 * * *'  # каждый день в 9:00 UTC
  workflow_dispatch:      # можно запустить вручную

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tester/requirements.txt

      - name: Run tester
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          REPORT_BOT_TOKEN: ${{ secrets.REPORT_BOT_TOKEN }}
          REPORT_CHAT_ID: ${{ secrets.REPORT_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tester/tester.py
