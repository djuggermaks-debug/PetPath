name: PetPath Bot Tester

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r tester/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run tester
        env:
          TELEGRAM_WEB_SESSION: ${{ secrets.TELEGRAM_WEB_SESSION }}
          REPORT_BOT_TOKEN: ${{ secrets.REPORT_BOT_TOKEN }}
          REPORT_CHAT_ID: ${{ secrets.REPORT_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tester/tester.py
